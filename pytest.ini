[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    redis: requires a live Redis instance (deselect with -m "not redis")
    docker: requires a running Docker daemon (deselect with -m "not docker")
    integration: full integration tests (deselect with -m "not integration")
    slow: tests that take > 5 seconds
addopts = -v --timeout=30
